# Edge Functions — disable gateway JWT verification.
# Each function validates the user's token itself via the Supabase Auth API
# (see _shared/auth.ts and generate-pv/index.ts), so the gateway check is
# redundant and was rejecting valid requests at the edge.

[functions.generate-pv]
verify_jwt = false

[functions.send-invite-email]
verify_jwt = false

[functions.send-pv-email]
verify_jwt = false

# Edge Functions org (create-org, invite-org-member, accept-org-invite,
# revoke-org-invite, remove-org-member, transfer-org-ownership, leave-org)
# retirées — POC solo, étage agence CUT (cf. migration 017).

[functions.ask-archipilot]
verify_jwt = false

[functions.transcribe-audio]
verify_jwt = false

[functions.send-push-notification]
verify_jwt = false
